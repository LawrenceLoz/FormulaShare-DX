<template>
    <div class="slds-m-bottom_medium slds-m-top_x-small">
        <div class="slds-grid slds-gutters">
            <div class="slds-col slds-size_5-of-12">
                <span>
                    <div class="slds-form slds-form_stacked">
                        <div class="slds-form-element">
                            <div class="slds-form-element__control">
                                <lightning-radio-group name="shareWith"
                                    label="Share With"
                                    options={shareWithOptions}
                                    value={_shareWith}
                                    onchange={handleShareWithChange}
                                    type="radio"
                                    variant="label-hidden"
                                    required>
                                </lightning-radio-group>

                                <template if:true={_shareWith}>
                                    <div class="slds-text-link_reset slds-text-link slds-m-horizontal_medium slds-m-top_x-small" onclick={toggleViewHowWorks}>
                                        {viewHowWorksToggleText}
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </span>
            </div>

            <div class="slds-col slds-size_7-of-12">
                <span>
                    <div class="slds-form slds-form_stacked">

                        <!-- Show team mapping fields when Teams is selected -->
                        <template if:true={shareWithFlags.teams}>
                            <div class="slds-form-element">
                                <div class="slds-form-element__control">
                                    <div style="display:flex; align-items:flex-end;">
                                        <lightning-combobox
                                            class="slds-grow"
                                            name="teamMapping"
                                            label="Team Type"
                                            value={selectedTeamMapping}
                                            placeholder="Select Team Type"
                                            options={teamMappingOptions}
                                            onchange={handleTeamMappingChange}
                                            message-when-value-missing="Select a Team Type"
                                            required>
                                        </lightning-combobox>

                                        <div class="slds-m-left_x-small" onclick={refreshTeamMappings}>
                                            <lightning-icon 
                                                icon-name="action:refresh" 
                                                alternative-text="Refresh" 
                                                title="Refresh team types" 
                                                size="x-small">
                                            </lightning-icon>
                                            <template if:true={loadingTeamMappings}>
                                                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                                            </template>
                                        </div>
                                    </div>

                                    <div class="slds-text-link_reset slds-text-link slds-m-horizontal_medium slds-m-top_small" onclick={toggleTeamsHelpBox}>
                                        Teams Configuration
                                    </div>
                                </div>
                            </div>

                            <template if:true={teamsHelpBox}>
                                <div class="slds-box slds-theme_shade slds-m-horizontal_medium slds-m-top_xx-small">
                                    <div style="display:flex; align-items:center;">
                                        <img src={infoCloudLogo} alt="infoCloudLogo" width="80">
                                        <div class="slds-m-left_medium">
                                            Teams can be defined by any objects in your org which have related records specifying team members.
                                            <lightning-formatted-url 
                                                value={teamConfigSetupLink} 
                                                label=" Click Teams Configuration " 
                                                target="_blank">
                                            </lightning-formatted-url>
                                            to configure a new Team Mapping based on your data model.
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <template if:true={selectedTeamMapping}>
                                <div class="slds-form-element">
                                    <div class="slds-form-element__control">
                                        <div style="display:flex; align-items:flex-end;">
                                            <lightning-combobox
                                                class="slds-grow"
                                                name="teamShareField"
                                                label="Specified in Field"
                                                value={selectedTeamField}
                                                placeholder="Select field"
                                                options={teamFieldOptions}
                                                onchange={handleTeamFieldChangeInternal}
                                                message-when-value-missing="Select a field containing the team identifier"
                                                required>
                                            </lightning-combobox>

                                            <div class="slds-m-left_x-small" onclick={refreshTeamFields}>
                                                <lightning-icon 
                                                    icon-name="action:refresh" 
                                                    alternative-text="Refresh" 
                                                    title="Refresh fields" 
                                                    size="x-small">
                                                </lightning-icon>
                                                <template if:true={loadingTeamFields}>
                                                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="slds-form-element">
                                    <div class="slds-form-element__control">
                                        <div style="display:flex; align-items:flex-end; gap:0.75rem;">
                                            <div style="flex:1;">
                                                <lightning-combobox
                                                    class="slds-m-top_x-small"
                                                    name="containingType"
                                                    label="Containing Type"
                                                    value={teamContainingTypeValue}
                                                    options={teamContainingTypeOptions}
                                                    onchange={handleTeamContainingTypeChange}
                                                    disabled={teamContainingTypeDisabled}
                                                    message-when-value-missing="Select containing type"
                                                    required>
                                                </lightning-combobox>
                                            </div>
                                            <div style="display:flex; flex-direction:column; padding-bottom:0.25rem; white-space:nowrap;">
                                                <template if:true={_selectedTeamField}>
                                                    <div class="slds-text-link_reset slds-text-link" onclick={toggleViewTeamFieldDetails}>
                                                        {teamFieldDetailsToggleText}
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                        <template if:true={showConditionsToggle}>
                                            <div class="slds-text-link_reset slds-text-link slds-m-top_medium" onclick={handleToggleConditions}>
                                                Add conditions
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <template if:true={viewTeamFieldDetails}>
                                    <div class="slds-m-horizontal_medium slds-m-bottom_medium">
                                        <c-formula-share-browse-field-contents
                                            object-api-name={_objectWithShareField}
                                            field-api-name={_selectedTeamField}>
                                        </c-formula-share-browse-field-contents>
                                    </div>
                                </template>
                            </template>
                        </template>

                        <!-- Show territories section when Territories of Account / Lead is selected -->
                        <template if:true={shareWithFlags.territoriesOfAccountLead}>
                            <div class="slds-form-element">
                                <div class="slds-form-element__control">
                                    <template if:true={territoryFieldOptions}>
                                        <lightning-combobox
                                            name="_shareField"
                                            label="Specified in Field"
                                            value={_shareField}
                                            placeholder="Select Account or Lead field"
                                            options={territoryFieldOptions}
                                            onchange={handleShareFieldChange}
                                            required>
                                        </lightning-combobox>
                                    </template>
                                </div>
                            </div>
                            <div class="slds-form-element">
                                <div class="slds-form-element__control">
                                    <lightning-combobox
                                        class="slds-m-top_x-small"
                                        name="territoryGroupType"
                                        label="Territory Type"
                                        value={territoryGroupType}
                                        options={territoryTypeOptions}
                                        onchange={handleTerritoryTypeChange}
                                        required>
                                    </lightning-combobox>
                                </div>
                            </div>
                            <template if:true={showConditionsToggle}>
                                <div class="slds-text-link_reset slds-text-link slds-m-top_medium" onclick={handleToggleConditions}>
                                    Add conditions
                                </div>
                            </template>
                        </template>

                        <!-- Show standard field selection when Teams and Territories are NOT selected -->
                        <template if:true={showStandardFieldSection}>
                        
                        <template if:true={showUserSharingModeToggle}>
                            <div class="slds-form-element">
                                <div class="slds-form-element__control">
                                    <lightning-radio-group
                                        name="userSharingMode"
                                        options={userSharingModeOptions}
                                        value={userSharingMode}
                                        onchange={handleUserSharingModeChange}
                                        type="radio"
                                        variant="label-hidden"
                                        required>
                                    </lightning-radio-group>
                                </div>
                            </div>
                        </template>
                        
                        <div class="slds-form-element">
                            <div class="slds-form-element__control">
                                <template if:true={fieldOptions}>

                                    <div style="display:flex; align-items:flex-end;">
                                        <lightning-combobox
                                            name="_shareField"
                                            label={shareFieldLabel}
                                            value={_shareField}
                                            placeholder="Select Field"
                                            options={fieldOptions}
                                            onchange={handleShareFieldChange}
                                            disabled={disableShareField}
                                            required >
                                        </lightning-combobox>

                                        <div class="slds-m-left_x-small" onclick={refreshFields}>
                                            <lightning-icon 
                                                icon-name="action:refresh" 
                                                alternative-text="Refresh" 
                                                title="Refresh fields from object" 
                                                size="x-small">
                                            </lightning-icon>
                                            <template if:true={loadingFields}>
                                                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                                            </template>
                                        </div>
                                    </div>
        
                                </template>
                            </div>
                        </div>

                        <div class="slds-form-element">
                            <div class="slds-form-element__control">

                                <template if:false={shareWithFlags.usersWithFieldMatch}>
                                    <div style="display:flex; align-items:flex-end; gap:0.75rem;">
                                        <div style="flex:1;">
                                            <lightning-combobox
                                                class="slds-m-top_x-small"
                                                name="shareFieldType"
                                                label="Containing Type"
                                                value={shareFieldType}
                                                placeholder="Select"
                                                options={shareFieldTypeOptions}
                                                onchange={handleShareFieldTypeChange}
                                                read-only={fieldTypeIsReadOnly}
                                                disabled={disableShareField}
                                                message-when-value-missing="Complete this field (depends on Share With option selected)"
                                                required >
                                            </lightning-combobox>
                                        </div>
                                        <div style="display:flex; flex-direction:column; padding-bottom:0.25rem; white-space:nowrap;">
                                            <template if:true={fieldType}>
                                                <div class="slds-text-link_reset slds-text-link" onclick={toggleViewFieldDetails}>
                                                    {fieldDetailsToggleText}
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                    <template if:true={showConditionsToggle}>
                                        <div class="slds-text-link_reset slds-text-link slds-m-top_medium" onclick={handleToggleConditions}>
                                            Add conditions
                                        </div>
                                    </template>
                                </template>

                                <!-- Sharing condition filter – Only When section -->
                                <!-- REMOVED: Conditions are now managed by the conditions component below -->


                                <template if:true={shareWithFlags.usersWithFieldMatch}>
                                    <div style="display:flex; align-items:flex-end; gap:0.75rem;">
                                        <div style="flex:1;">
                                            <div style="display:flex; align-items:flex-end;">
                                                <lightning-combobox
                                                    class="slds-m-top_x-small slds-grow"
                                                    name="userFieldForMatching"
                                                    label="User Field"
                                                    value={selectedUserFieldForMatching}
                                                    placeholder="Select User field"
                                                    options={userFieldMatchOptions}
                                                    onchange={handleUserFieldForMatchingChange}
                                                    required >
                                                </lightning-combobox>

                                                <div class="slds-m-left_x-small" onclick={refreshUserFields}>
                                                    <lightning-icon
                                                        icon-name="action:refresh"
                                                        alternative-text="Refresh"
                                                        title="Refresh user fields"
                                                        size="x-small">
                                                    </lightning-icon>
                                                    <template if:true={loadingUserFields}>
                                                        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                        <div style="display:flex; flex-direction:column; padding-bottom:0.25rem; white-space:nowrap;">
                                            <template if:true={selectedUserFieldForMatching}>
                                                <div class="slds-text-link_reset slds-text-link" onclick={toggleViewUserFieldDetails}>
                                                    {userFieldDetailsToggleText}
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                    <template if:true={showConditionsToggle}>
                                        <div class="slds-text-link_reset slds-text-link slds-m-top_medium" onclick={handleToggleConditions}>
                                            Add conditions
                                        </div>
                                    </template>
                                </template>

                            </div>
                        </div>

                        </template><!-- end showStandardFieldSection -->
                    </div>
                </span>
            </div>
        </div>


        <template if:true={viewHowWorks}>
            <div class="slds-box slds-theme_shade slds-m-horizontal_medium slds-m-bottom_small slds-float_right">
                
                <div style="display:flex; align-items:center;">
                    <img src={infoCloudLogo} alt="infoCloudLogo" width="80">
                    <div class="slds-m-left_medium">

                        <!-- It would have been nice to use a template expresssion here but they don't seem to work within template tags -->
                        <template if:true={shareWithFlags.usersOrUsersWithFieldMatch}>
                            There are two ways of sharing based on associated users.
                            <br/><br/>
                            Choose <b>"Specified in record field"</b> to share to users indicated in a field on the record. This field can be either a lookup to the user object, or a text or formula field populated with the 15 or 18 character id of the user to receive access.
                            <br/><br/>
                            Choose <b>"With a User field matching the record field"</b> to share to all users which have a value set in a field on their user record which matches a selected field on the record. Both fields can be either text, picklists, lookups, or formulas returning text. When this option is selected
                            , public groups will be created and maintained by FormulaShare for each unique value in the field selected as "User Field".
                            Groups can be monitored in the&nbsp;<lightning-formatted-url
                                value={teamConfigSetupLink}
                                label="Team and User Groups"
                                target="_blank"></lightning-formatted-url>&nbsp;page of FormulaShare Setup.
                        </template>

                        <template if:true={shareWithFlags.roles}>
                            When <b>Roles</b> is selected, rules will share to the&nbsp;
                            <lightning-formatted-url 
                            value={rolesLink} 
                            label="Roles" 
                            target="_blank"></lightning-formatted-url>
                            &nbsp;referenced in the field selected as "Specified in Field".
                            This field can be a text or formula field populated with the Role Name (DeveloperName) of the role, or its 15 or 18 character id.
                        </template>

                        <template if:true={shareWithFlags.rolesAndInternalSubordinates}>
                            When <b>Roles and Internal Subordinates</b> is selected, rules will share to the&nbsp;
                            <lightning-formatted-url 
                            value={rolesLink} 
                            label="Roles" 
                            target="_blank"></lightning-formatted-url>
                            &nbsp;referenced in the field selected as "Specified in Field",
                            as well as any internal roles which are below in the hierarchy.
                            This field can be a text or formula field populated with the Role Name (DeveloperName) of the role, or its 15 or 18 character id.
                        </template>

                        <template if:true={shareWithFlags.rolesInternalAndPortalSubordinates}>
                            When <b>Roles, Internal and Portal Subordinates</b> is selected, rules will share to the&nbsp;
                            <lightning-formatted-url 
                            value={rolesLink} 
                            label="Roles" 
                            target="_blank"></lightning-formatted-url>
                            &nbsp;referenced in the field selected as "Specified in Field",
                            as well as any internal or external (i.e. Experience Cloud) roles which are below in the hierarchy.
                            This field can be a text or formula field populated with the Role Name (DeveloperName) of the role, or its 15 or 18 character id.
                        </template>

                        <template if:true={shareWithFlags.publicGroups}>
                            When <b>Public Groups or Queues</b> is selected, rules will share to the groups or queues referenced in the field selected as "Specified in Field".
                            These can either be&nbsp;
                            <lightning-formatted-url 
                            value={publicGroupsLink} 
                            label="Public Groups" 
                            target="_blank"></lightning-formatted-url>
                            ,&nbsp;
                            <lightning-formatted-url 
                            value={queuesLink} 
                            label="Queues" 
                            target="_blank"></lightning-formatted-url>
                            &nbsp;which support the shared object, or the standard organization group "AllInternalUsers".
                            This field can be a text or formula field populated with the Group Name or Queue Name (DeveloperName), or its 15 or 18 character id.
                        </template>

                        <template if:true={shareWithFlags.managersOfusers}>
                            When <b>Managers of Users</b> is selected, rules will share to the&nbsp;
                            <lightning-formatted-url 
                                value="https://help.salesforce.com/s/articleView?id=sf.users_managers_only.htm&type=5" 
                                label="Manager Groups" 
                                target="_blank">
                            </lightning-formatted-url>
                            &nbsp;of the&nbsp;
                            <lightning-formatted-url 
                            value={usersLink} 
                            label="User" 
                            target="_blank"></lightning-formatted-url>
                            &nbsp;referenced in the field selected as "Specified in Field".
                            Manager Groups are based on the "Manager" lookup on the user object, and include the direct and indirect managers of the selected user, but don't include the user themselves.
                            This field can be either a lookup to the user object, or a text or formula field populated with the 15 or 18 character 
                            id of the user whose Manager Group should have access.
                        </template>

                        <template if:true={shareWithFlags.usersAndManagerSubordinates}>
                            When <b>Users and Manager Subordinates</b> is selected, rules will share to the&nbsp;
                            <lightning-formatted-url 
                                value="https://help.salesforce.com/s/articleView?id=sf.users_managers_only.htm&type=5" 
                                label="Manager Subordinates Groups" 
                                target="_blank">
                            </lightning-formatted-url>
                            &nbsp;of the&nbsp;
                            <lightning-formatted-url 
                            value={usersLink} 
                            label="User" 
                            target="_blank"></lightning-formatted-url>
                            &nbsp;referenced in the field selected as "Specified in Field".
                            Manager Subordinates Groups are based on the "Manager" lookup on the user object, and include the selected user themselves, and all direct and indirect reports.
                            This field can be either a lookup to the user object, or a text or formula field populated with the 15 or 18 character 
                            id of the user whose Manager Subordinates Group should have access.
                        </template>

                        <template if:true={shareWithFlags.defaultAccountTeamsOfUsers}>
                            When <b>Default Account Teams of Users</b> is selected, rules will share to all users within the&nbsp;
                            <lightning-formatted-url 
                                value="https://help.salesforce.com/s/articleView?id=000382679&type=1" 
                                label="Default Account Team" 
                                target="_blank">
                            </lightning-formatted-url>
                            &nbsp;of the&nbsp;
                            <lightning-formatted-url 
                            value={usersLink} 
                            label="User" 
                            target="_blank"></lightning-formatted-url>
                            &nbsp;referenced in the field selected as "Specified in Field".
                            This field can be either a lookup to the user object, or a text or formula field populated with the 15 or 18 character 
                            id of the user whose team should have access.
                            Default Account Team members are set up in the related list on the user record - the rule will share directly to all team members associated in this way, and update after team members change.
                        </template>

                        <template if:true={shareWithFlags.defaultOpportunityTeamsOfUsers}>
                            When <b>Default Opportunity Teams of Users</b> is selected, rules will share to all users within the&nbsp;
                            <lightning-formatted-url 
                                value="https://help.salesforce.com/s/articleView?id=000382679&type=1" 
                                label="Default Opportunity Team" 
                                target="_blank">
                            </lightning-formatted-url>
                            &nbsp;of the&nbsp;
                            <lightning-formatted-url 
                            value={usersLink} 
                            label="User" 
                            target="_blank"></lightning-formatted-url>
                            &nbsp;referenced in the field selected as "Specified in Field".
                            This field can be either a lookup to the user object, or a text or formula field populated with the 15 or 18 character 
                            id of the user whose team should have access.
                            Default Opportunity Team members are set up in the related list on the user record - the rule will share directly to all team members associated in this way, and update after team members change.
                        </template>

                        <template if:true={shareWithFlags.teams}>
                            When <b>Teams</b> is selected, rules will share to public groups managed by FormulaShare based on team configurations defined in <lightning-formatted-url
                                value={teamConfigSetupLink}
                                label="Team Mappings"
                                target="_blank"></lightning-formatted-url>.
                            <br/><br/>
                            Select a <b>Team Mapping</b> to define which team structure to use, then choose the field on the record that identifies which team should receive access.
                            FormulaShare will automatically create and maintain public groups for each team, including group nesting for team hierarchies and affiliations.
                            Team Mappings and groups can be configured and monitored in the&nbsp;<lightning-formatted-url
                                value={teamConfigSetupLink}
                                label="Team and User Groups"
                                target="_blank"></lightning-formatted-url>&nbsp;page of FormulaShare Setup.
                        </template>

                        <template if:true={shareWithFlags.territoriesOfAccountLead}>
                            When <b>Territories of Account / Lead</b> is selected, FormulaShare shares records with the Enterprise Territory Management territories associated with the Account or Lead referenced in the selected field.
                            Users assigned to those territories receive the access level set on this rule, and sharing is updated automatically as territory assignments change.
                            <br/><br/>
                            Choose <b>Territory</b> to share with users directly assigned to the territory.
                            Choose <b>Territory and Subordinates</b> to also share to all subordinate territories in the territory hierarchy.
                        </template>

                    </div>
                </div>
            </div>
        </template>

        <template if:true={viewFieldDetails}>
            <div class="slds-m-horizontal_medium slds-m-bottom_medium">
                <c-formula-share-browse-field-contents
                    object-api-name={objectWithShareField}
                    field-api-name={shareField}
                    field-formula={fieldFormula}>
                </c-formula-share-browse-field-contents>
            </div>
        </template>

        <template if:true={viewUserFieldDetails}>
            <div class="slds-m-horizontal_medium slds-m-bottom_medium">
                <c-formula-share-browse-field-contents
                    object-api-name="User"
                    field-api-name={selectedUserFieldForMatching}>
                </c-formula-share-browse-field-contents>
            </div>
        </template>

        <!-- Conditions panel injected here from parent via named slot -->
        <slot name="conditions"></slot>

        <template lwc:if={showAdvancedSettingsToggle}>
            <div class="slds-grid slds-grid_align-end slds-m-horizontal_medium slds-m-top_x-small">
                <div class="slds-text-link_reset slds-text-link"
                    onclick={toggleAdvancedSettings}>
                    {advancedSettingsToggleText}
                </div>
            </div>
        </template>

        <template lwc:if={viewAdvancedSettings}>
            <div class="slds-m-horizontal_medium slds-form-element slds-box">

                <template lwc:if={isCustom}>
                    <lightning-card title="Sharing Removal Strategy">
                        <div class="slds-m-horizontal_small slds-m-bottom_small">
                            <div style="display:flex; align-items:center;">
                                <div style="flex-grow:1; min-width:0;">
                                    <lightning-combobox
                                        name="sharingRemovalStrategy"
                                        label="Sharing Removal Strategy"
                                        variant="label-hidden"
                                        options={sharingRemovalStrategyOptions}
                                        value={sharingRemovalStrategyValue}
                                        onchange={handleSharingRemovalStrategyChange}>
                                    </lightning-combobox>
                                </div>
                                <div class="slds-text-link_reset slds-text-link slds-p-left_small slds-p-top_xx-small"
                                    style="white-space:nowrap;"
                                    onclick={toggleSharingRemovalInfo}>
                                    What does this mean?
                                </div>
                            </div>
                            <template lwc:if={sharingRemovalInfo}>
                                <div class="slds-box slds-theme_shade slds-m-top_small">
                                    <div style="display:flex; align-items:flex-start;">
                                        <img src={infoCloudLogo} alt="info" width="80">
                                        <div class="slds-m-left_medium">
                                            <p>Sharing removal strategy is set in <lightning-formatted-url
                                                value={objectSettingsLink}
                                                label="Object Settings"
                                                target="_blank">
                                            </lightning-formatted-url>, but for custom objects, the setting can be overridden for specific rules.</p>
                                            <p class="slds-m-top_small">When removal strategy for a custom object is set to "Fully Managed", FormulaShare will create sharing on the object, and will also remove any sharing for sharing reasons used in rules which no longer meets the rule criteria. This is the default option for custom objects.</p>
                                            <p class="slds-m-top_small">When removal strategy is set to "Create Only", FormulaShare will create sharing for rules on the object, but won't remove any sharing no longer meeting these criteria.</p>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </lightning-card>
                </template>

                <lightning-card title="Action for non-matching records">
                    <div class="slds-m-horizontal_small slds-m-bottom_small">

                        <template lwc:if={mdMappingType}>
                            <div class="slds-m-top_small">
                                <label class="slds-form-element__label" for="behaviourMdMatchFieldMismatch">
                                    <abbr class="slds-required" title="required">*</abbr>
                                    If no matching Custom Metadata record
                                </label>
                                <lightning-helptext content={behaviourMdMatchFieldMismatchHelpText}></lightning-helptext>
                            </div>

                            <div style="display: flex; justify-content: space-between; margin-left: auto;">

                                <div style="flex-grow: 1; flex-basis: 0; min-width: 0;">
                                    <lightning-combobox
                                        id="behaviourMdMatchFieldMismatch"
                                        name="behaviourMdMatchFieldMismatch"
