<template>
  <template if:false={rulesNotSetUp}>
    <c-formula-share-tree-grid
      rows={treeItems}
      columns={columns}
      key-field="key"
      hide-checkbox-column="true"
      onrowaction={handleRowAction}
      expanded-rows={currentExpanded}
    >
    </c-formula-share-tree-grid>
    <template if:true={processingLoad}>
      <lightning-spinner
        class={spinnerClasses}
        alternative-text="Loading"
        size="medium"
      ></lightning-spinner>
    </template>
  </template>

  <template if:true={openModal}>
    <c-formula-share-rule-edit rule-id={rowRuleId} onclose={closeModal}>
    </c-formula-share-rule-edit>
  </template>

  <template if:true={openCreateModal}>
    <c-formula-share-rule-create
      shared-object-api-name={createModalObjectApiName}
      onclose={closeCreateModal}
    >
    </c-formula-share-rule-create>
  </template>

  <template if:true={openApplyModal}>
    <c-formula-share-apply-rules-to-record
      object-api-name={applyModalObjectApiName}
      object-label={applyModalObjectLabel}
      preselected-rules={applyModalPreselectedRules}
      onclose={closeApplyModal}
    >
    </c-formula-share-apply-rules-to-record>
  </template>

  <template if:true={openRecalcConfirmModal}>
    <c-formula-share-recalc-confirm
      object-label={recalcConfirmObjectLabel}
      batch-logs-url={recalcBatchLogsUrl}
      onconfirm={confirmRecalc}
      oncancel={cancelRecalc}
    >
    </c-formula-share-recalc-confirm>
  </template>
</template>
